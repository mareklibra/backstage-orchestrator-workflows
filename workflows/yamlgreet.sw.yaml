id: yamlgreet
version: '1.0'
specVersion: '0.8'
name: Greeting workflow
description: YAML based greeting workflow
dataInputSchema: schemas/yamlgreet__main-schema.json
start: ChooseOnLanguage
functions:
  - name: greetFunction
    type: custom
    operation: sysout
  - name: logOutput
    type: custom
    operation: "sysout:INFO"    
  - name: assessmentResult
    type: expression
    operation: '{
        result: {
          "completedWith":"success",
          "message": "The workflow ${{ values.workflowId }} completed successfully",
          "outputs":[
            {
              "key": "Validated Result",
              "value": .validatedResult
            }
          ],
          "nextWorkflows":[
            {
                "id": .executeResult.currentVersion.id,
                "name": .executeResult.currentVersion.name
            }
          ]
        }
      }'
  - name: errorAssessmentResult
    type: expression
    operation: '{
        result: {
          "completedWith":"error",
          "message": "The workflow ${{ values.workflowId }} completed with error",
          "outputs":[
            {
              "key": "Missing Workflows",
              "value": (.missingWorkflows | join(","))
            }
          ],
          "nextWorkflows":[]
        }
      }'    
states:
  - name: ChooseOnLanguage
    type: switch
    dataConditions:
      - condition: ${ .language == "English" }
        transition: reportNoError
      - condition: ${ .language == "Spanish" }
        transition: reportFailure
    defaultCondition:
      transition: GreetInEnglish
  - name: reportNoError
    type: operation
    actions:
      - name: reportNoError
        functionRef:
          refName: assessmentResult
    transition: printAction
  - name: reportFailure
    type: operation
    actions:
      - name: reportFailure
        functionRef:
          refName: errorAssessmentResult
    transition: printAction    
  - name: printAction
    type: operation
    actions:
      - functionRef:
          refName: logOutput
          arguments:
            message: ".result"
    end: true           
  - name: GreetInEnglish
    type: inject
    data:
      greeting: 'Hello from YAML Workflow, '
    transition: GreetPerson
  - name: GreetInSpanish
    type: inject
    data:
      greeting: 'Saludos desde YAML Workflow, '
    transition: GreetPerson
  - name: GreetPerson
    type: operation
    actions:
      - name: greetAction
        functionRef:
          refName: greetFunction
          arguments:
            message: .greeting+.name
    end:
      terminate: true
